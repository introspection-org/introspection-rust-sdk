[package]
name = "introspection-sdk"
version = "0.1.0"
edition = "2021"
description = "Rust SDK for Introspection — continuously improve your AI systems with production feedback and frontier practices"
license = "MIT"
repository = "https://github.com/introspection-org/introspection-rust-sdk"
keywords = ["ai", "llm", "opentelemetry", "otlp", "introspection"]
categories = ["development-tools", "api-bindings"]
readme = "README.md"

[features]
default = []
testing = ["opentelemetry_sdk/testing"]
logfire = ["dep:logfire"]
openai = ["dep:async-openai"]

[dependencies]
# Async runtime
tokio = { version = "1.44", features = ["rt-multi-thread", "sync", "time", "macros"] }

# OpenTelemetry — pinned to 0.30.x (logfire 0.9 requires opentelemetry 0.30)
opentelemetry = { version = "0.30.0", default-features = false, features = ["logs", "trace"] }
opentelemetry_sdk = { version = "0.30.0", default-features = false, features = ["rt-tokio", "logs", "trace"] }
opentelemetry-otlp = { version = "0.30.0", default-features = false, features = ["logs", "trace", "http-proto", "reqwest-client"] }

# HTTP client — blocking reqwest for BatchSpanProcessor's dedicated thread
reqwest = { version = "0.12", default-features = false, features = ["blocking", "rustls-tls-native-roots"] }

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Utilities
uuid = { version = "1.22", features = ["v4"] }
thiserror = "2"
tracing = "0.1"

# Builder pattern support
derive_builder = "0.20"

# Optional: logfire integration
logfire = { version = "0.9.0", optional = true }

# Optional: async-openai integration
async-openai = { version = "0.33", features = ["chat-completion", "responses"], optional = true }

# Streaming support (StreamExt for async-openai streams)
futures = "0.3"

# Load .env files for examples and integration tests
dotenvy = "0.15"

[dev-dependencies]
tokio = { version = "1.44", features = ["rt-multi-thread", "macros"] }
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
insta = { version = "1", features = ["json", "redactions"] }
wiremock = "0.6"
async-openai = { version = "0.33", features = ["chat-completion"] }
dotenvy = "0.15"

[[example]]
name = "logfire_dual_export"
required-features = ["logfire", "openai"]

[[example]]
name = "openai_tool_call"
required-features = ["openai"]

[[example]]
name = "openai_streaming"
required-features = ["openai"]

[[example]]
name = "logfire_introspection"
required-features = ["logfire", "openai"]

[[example]]
name = "responses_api_features"
required-features = ["openai"]

# Linting configuration
# Run: cargo clippy -- -W clippy::all -W clippy::pedantic
# Or use: cargo clippy --all-targets -- -W warnings
