name: Release Please

# Maintains the release PR (changelog + version.txt bump) AND cuts the
# vX.Y.Z tag + GitHub Release when that PR merges — the release-PR merge IS
# the release. The tag (app-token push) triggers publish.yml as before.
# release-tag.yml remains as a dispatch-only break-glass tagger.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    environment: build
    steps:
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ vars.GH_APP_ID }} # variable, not secret — app IDs aren't sensitive
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - uses: googleapis/release-please-action@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
