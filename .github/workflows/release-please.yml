name: Release Please

# Maintains the release PR only: accumulates the conventional-commit
# changelog and bumps version.txt. Deliberately does NOT tag or publish
# (skip-github-release) — merging the release PR changes version.txt, which
# triggers release-tag.yml's existing validate/wait gates to cut the v* tag
# that publish.yml consumes. The release flow is unchanged; "edit VERSION by
# hand" is replaced by "merge the release PR".

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    environment: build
    steps:
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ vars.GH_APP_ID }} # variable, not secret — app IDs aren't sensitive
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - uses: googleapis/release-please-action@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
