name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  secrets-scan:
    name: Secrets Scan
    runs-on: ubuntu-latest
    environment: build
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  lint-actions:
    name: Lint GitHub Actions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run actionlint
        uses: raven-actions/actionlint@v2

  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Run tests (all features)
        run: cargo test --features testing,openai,logfire

  integration:
    name: Integration Tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    environment: build
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Run integration tests
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          INTROSPECTION_TOKEN: ${{ secrets.INTROSPECTION_TOKEN }}
          INTROSPECTION_BASE_URL: ${{ vars.INTROSPECTION_BASE_URL }}
        run: cargo test --features testing,openai --test responses_api_test -- --ignored

  examples:
    name: Run Examples
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: integration
    runs-on: ubuntu-latest
    environment: build
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Run examples
        env:
          INTROSPECTION_TOKEN: ${{ secrets.INTROSPECTION_TOKEN }}
          INTROSPECTION_BASE_URL: ${{ vars.INTROSPECTION_BASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          LOGFIRE_TOKEN: ${{ secrets.LOGFIRE_TOKEN }}
        run: ./scripts/run_examples.sh

  # ── Create release tag (only on VERSION change) ────────────────────
  create-tag:
    name: Create release tag
    needs: [lint-actions, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: build
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Check if VERSION changed
        id: check
        run: |
          if git diff HEAD~1 --name-only | grep -q '^VERSION$'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "version=$(tr -d '[:space:]' < VERSION)" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate GitHub App token
        if: steps.check.outputs.changed == 'true'
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.GH_APP_ID || secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner: introspection-org
          repositories: introspection-rust-sdk

      - name: Configure git with App token
        if: steps.check.outputs.changed == 'true'
        run: |
          git remote set-url origin "https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/${{ github.repository }}.git"

      - name: Create and push tag
        if: steps.check.outputs.changed == 'true'
        run: |
          VERSION="${{ steps.check.outputs.version }}"
          TAG="v${VERSION}"

          if git tag -l "${TAG}" | grep -q .; then
            echo "Tag ${TAG} already exists, skipping."
            exit 0
          fi

          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          git tag -a "${TAG}" -m "Release ${TAG}"
          git push origin "${TAG}"
          echo "Created and pushed tag ${TAG}"
